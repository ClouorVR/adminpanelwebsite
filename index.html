<!DOCTYPE html>
<html>
<head>
    <title>ClouorVR Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white flex h-screen font-sans select-none overflow-hidden">
    <div class="w-64 bg-gray-800 p-6 flex flex-col gap-4 shadow-2xl border-r border-gray-700">
        <h1 class="text-2xl font-black text-orange-500 mb-4 tracking-wide border-b border-gray-700 pb-2">ClouorVR</h1>
        <button onclick="switchTab('players')" class="text-left bg-orange-600 p-3 rounded font-bold hover:bg-orange-500 transition shadow-md">Players</button>
        <button onclick="switchTab('allplayers')" class="text-left bg-gray-700 p-3 rounded font-bold hover:bg-orange-600 transition">All Players</button>
        <button onclick="switchTab('analytics')" class="text-left bg-gray-700 p-3 rounded font-bold hover:bg-orange-600 transition">Analytics</button>
    </div>
    <div class="flex-1 p-10 overflow-y-auto bg-gradient-to-b from-gray-950 to-gray-900">
        <div id="tab-players" class="tab-content block">
            <h2 class="text-3xl font-black mb-6 tracking-tight text-orange-400">Player Management</h2>
            <div class="flex gap-2 mb-8 bg-gray-800 p-4 rounded-xl border border-gray-700 w-full max-w-2xl shadow-lg">
                <select id="searchType" class="p-3 rounded bg-gray-900 text-white border border-gray-700 outline-none font-bold text-sm">
                    <option value="id">Player ID</option>
                    <option value="name">Player Name</option>
                </select>
                <input type="text" id="playerId" class="flex-1 p-3 rounded bg-gray-700 text-white border border-gray-600 outline-none focus:border-orange-500 font-mono" placeholder="Search query...">
                <button onclick="searchPlayer()" class="bg-orange-600 font-black px-8 rounded hover:bg-orange-500 transition text-sm uppercase tracking-wider">Search</button>
            </div>
            <div id="playerStats" class="hidden bg-gray-800 p-6 rounded-xl border border-gray-700 w-full max-w-2xl shadow-2xl relative">
                <div class="absolute top-6 right-6 flex gap-2">
                    <span id="adminBadge" class="hidden bg-purple-600 text-white text-xs font-black px-3 py-1 rounded shadow">ADMIN</span>
                    <span id="banBadge" class="hidden bg-red-600 text-white text-xs font-black px-3 py-1 rounded shadow">BANNED</span>
                </div>
                <h3 class="text-3xl font-black text-green-400 mb-1" id="displayName">Player</h3>
                <p class="text-gray-400 font-mono text-sm mb-6">Database ID: <span id="displayId" class="text-white font-bold"></span></p>
                <div class="grid grid-cols-2 gap-6">
                    <div class="bg-gray-900 p-4 rounded-xl border border-gray-700 shadow-inner">
                        <h4 class="font-bold text-gray-400 mb-2 uppercase text-xs tracking-wider">Pebbles Wallet</h4>
                        <p class="text-2xl font-black text-yellow-400 mb-3" id="pebbleCount">0</p>
                        <div class="flex gap-2 mb-2">
                            <input type="number" id="pebbleAmount" class="w-full p-2 bg-gray-800 border border-gray-700 rounded text-center font-bold text-white focus:border-yellow-500" value="100">
                            <button onclick="modifyPebbles(true)" class="bg-green-600 font-black px-4 rounded hover:bg-green-500 transition">+</button>
                            <button onclick="modifyPebbles(false)" class="bg-red-600 font-black px-4 rounded hover:bg-red-500 transition">-</button>
                        </div>
                        <button onclick="setPebbles()" class="bg-purple-600 w-full py-2 rounded hover:bg-purple-500 text-xs font-bold transition">Set Exact Balance</button>
                    </div>
                    <div class="bg-gray-900 p-4 rounded-xl border border-gray-700 shadow-inner flex flex-col justify-between">
                        <div>
                            <h4 class="font-bold text-gray-400 mb-2 uppercase text-xs tracking-wider">Identity Controls</h4>
                            <input type="text" id="newName" class="w-full p-2 bg-gray-800 border border-gray-700 rounded font-mono text-sm mb-2" placeholder="New Nickname">
                            <button onclick="changeName()" class="bg-orange-600 font-bold py-2 w-full rounded hover:bg-orange-500 text-xs transition mb-4">Set Name</button>
                            <h4 class="font-bold text-gray-400 mb-2 uppercase text-xs tracking-wider">Moderation Controls</h4>
                        </div>
                        <div class="flex flex-col gap-2">
                            <button id="adminBtn" onclick="toggleAdmin()" class="bg-purple-600 font-bold py-2 rounded hover:bg-purple-500 text-xs transition">Toggle Admin</button>
                            <button id="banBtn" onclick="toggleBan()" class="bg-red-600 font-bold py-2 rounded hover:bg-red-500 text-xs transition">Toggle Ban</button>
                        </div>
                    </div>
                    <div class="bg-gray-900 p-4 rounded-xl border border-gray-700 shadow-inner col-span-2">
                        <h4 class="font-bold text-gray-400 mb-2 uppercase text-xs tracking-wider">Cosmetics Inventory</h4>
                        <ul id="cosmeticList" class="text-sm font-mono text-gray-300 mb-3 list-disc pl-5 h-24 overflow-y-auto bg-gray-800 p-2 rounded border border-gray-700"></ul>
                        <div class="flex gap-2">
                            <input type="text" id="cosmeticId" class="flex-1 p-2 bg-gray-800 border border-gray-700 rounded font-mono text-sm" placeholder="slot:item_name">
                            <button onclick="manageCosmetic(true)" class="bg-blue-600 font-bold px-4 rounded hover:bg-blue-500 text-xs transition">Give</button>
                            <button onclick="manageCosmetic(false)" class="bg-red-600 font-bold px-4 rounded hover:bg-red-500 text-xs transition">Revoke</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div id="tab-allplayers" class="tab-content hidden">
            <h2 class="text-3xl font-black mb-6 text-orange-400">All Database Players</h2>
            <button onclick="loadAllPlayers()" class="bg-orange-600 font-bold px-6 py-2.5 rounded-lg mb-4 hover:bg-orange-500 shadow transition text-sm">Refresh List</button>
            <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 max-w-2xl shadow-lg">
                <ul id="allList" class="divide-y divide-gray-700 font-mono text-sm">
                    <li class="py-2 text-gray-500 italic">Click refresh to scan...</li>
                </ul>
            </div>
        </div>
        <div id="tab-analytics" class="tab-content hidden">
            <h2 class="text-3xl font-black mb-6 text-orange-400">Game Analytics</h2>
            <button onclick="loadAnalytics()" class="bg-orange-600 font-bold px-6 py-2.5 rounded-lg mb-6 hover:bg-orange-500 shadow transition text-sm">Recalculate Totals</button>
            <div class="grid grid-cols-2 gap-6 max-w-2xl">
                <div class="bg-gray-800 border border-gray-700 p-6 rounded-xl text-center shadow-lg">
                    <h3 class="text-xs font-bold text-gray-400 uppercase tracking-wider">Total Players</h3>
                    <p id="totalPlayers" class="text-5xl font-black text-orange-400 mt-2">0</p>
                </div>
                <div class="bg-gray-800 border border-gray-700 p-6 rounded-xl text-center shadow-lg">
                    <h3 class="text-xs font-bold text-gray-400 uppercase tracking-wider">Total Pebbles</h3>
                    <p id="totalPebbles" class="text-5xl font-black text-yellow-400 mt-2">0</p>
                </div>
            </div>
        </div>
    </div>
    <script>
        const API_URL = "https://your-worker-url.workers.dev/api";
        const SECRET = "YOUR_SUPER_SECRET_KEY";
        window.switchTab = (tabName) => {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById('tab-' + tabName).classList.remove('hidden');
        };
        async function apiCall(body) {
            let r = await fetch(API_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json", "Authorization": SECRET },
                body: JSON.stringify(body)
            });
            return await r.json();
        }
        window.searchPlayer = async () => {
            const input = document.getElementById('playerId').value.trim();
            const type = document.getElementById('searchType').value;
            if (!input) return;
            let res = await apiCall({ action: "get_player", type: type, query: input });
            if (res.found) {
                document.getElementById('playerStats').classList.remove('hidden');
                document.getElementById('displayName').innerText = res.data.name;
                document.getElementById('displayId').innerText = res.data.id;
                document.getElementById('pebbleCount').innerText = res.data.pebbles || 0;
                document.getElementById('adminBadge').classList.toggle('hidden', !res.data.isAdmin);
                document.getElementById('adminBtn').innerText = res.data.isAdmin ? "Revoke Admin Status" : "Give Admin Status";
                document.getElementById('banBadge').classList.toggle('hidden', !res.data.isBanned);
                document.getElementById('banBtn').innerText = res.data.isBanned ? "Lift Network Ban" : "Ban Player Account";
                const cosList = document.getElementById('cosmeticList');
                cosList.innerHTML = '';
                if (res.data.cosmetics && res.data.cosmetics.length > 0) {
                    res.data.cosmetics.forEach(i => cosList.innerHTML += `<li>${i}</li>`);
                } else {
                    cosList.innerHTML = `<li class="text-gray-500 italic">No cosmetics</li>`;
                }
            } else {
                alert("bruh that record doesnt exist :(");
                document.getElementById('playerStats').classList.add('hidden');
            }
        };
        window.modifyPebbles = async (isAdding) => {
            const id = document.getElementById('displayId').innerText;
            const amt = parseInt(document.getElementById('pebbleAmount').value);
            if (!id || isNaN(amt)) return;
            await apiCall({ action: "edit_pebbles", id: id, amount: isAdding ? amt : -amt });
            searchPlayer();
        };
        window.setPebbles = async () => {
            const id = document.getElementById('displayId').innerText;
            const amt = parseInt(document.getElementById('pebbleAmount').value);
            if (!id || isNaN(amt)) return;
            await apiCall({ action: "set_pebbles", id: id, amount: amt });
            searchPlayer();
        };
        window.changeName = async () => {
            const id = document.getElementById('displayId').innerText;
            const name = document.getElementById('newName').value;
            if (!id || !name) return;
            await apiCall({ action: "set_name", id: id, value: name });
            document.getElementById('newName').value = '';
            searchPlayer();
        };
        window.toggleAdmin = async () => {
            const id = document.getElementById('displayId').innerText;
            if (!id) return;
            await apiCall({ action: "toggle_admin", id: id });
            searchPlayer();
        };
        window.toggleBan = async () => {
            const id = document.getElementById('displayId').innerText;
            if (!id) return;
            await apiCall({ action: "toggle_ban", id: id });
            searchPlayer();
        };
        window.manageCosmetic = async (isGiving) => {
            const id = document.getElementById('displayId').innerText;
            const cos = document.getElementById('cosmeticId').value.trim();
            if (!id || !cos) return;
            await apiCall({ action: isGiving ? "give_cosmetic" : "revoke_cosmetic", id: id, value: cos });
            document.getElementById('cosmeticId').value = '';
            searchPlayer();
        };
        window.loadAllPlayers = async () => {
            const list = document.getElementById('allList');
            list.innerHTML = 'Loading streams...';
            let res = await apiCall({ action: "get_all" });
            list.innerHTML = '';
            if(res.players) {
                res.players.forEach(p => {
                    list.innerHTML += `<li class="py-2 flex justify-between items-center"><span class="font-bold text-green-400">${p.name}</span><span class="text-gray-500 text-xs">${p.id}</span></li>`;
                });
            }
        };
        window.loadAnalytics = async () => {
            let res = await apiCall({ action: "get_all" });
            if(res.players) {
                let pbs = 0;
                res.players.forEach(p => pbs += (p.pebbles||0));
                document.getElementById('totalPlayers').innerText = res.players.length;
                document.getElementById('totalPebbles').innerText = pbs;
            }
        };
    </script>
</body>
</html>
